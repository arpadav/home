[[language]]
name = "toml"
file-types = ["toml"]
auto-format = true

[[language]]
name = "nix"
language-servers = ["nil"]

[[language]]
name = "bash"
scope = "source.bash"
file-types = ["sh", "bash"]
formatter = { command = "shfmt", args = ["-i", "4", "-ci"] }

[[language]]
name = "just"
language-servers = [
  "just-lsp",
]

# [[language]]
