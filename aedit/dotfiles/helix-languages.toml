# language-servers = ["superhtml"]

[[language]]
name = "rust"
auto-format = true
formatter = { command = "rustfmt", args = ["--edition", "2024"] }
language-servers = [
  "rust-analyzer",
]

[[language]]
name = "python"
auto-format = true
language-servers = [
  { name = "pylsp", except-features = ["format"] },
  "ruff",
]

# [language-server.superhtml]
# command = "superhtml"
# args = ["lsp"]

[language-server.rust-analyzer]
config = { checkOnSave = { command = "clippy" }, cargo = { allFeatures = true } }

[language-server.nil]
command = "nil"

[language-server.pylsp.config.pylsp.plugins]
ruff.enabled = true
autopep8.enabled = false
flake8.enabled = false
mccabe.enabled = false
pycodestyle.enabled = false
pyflakes.enabled = false
pylint.enabled = false
yapf.enabled = false
